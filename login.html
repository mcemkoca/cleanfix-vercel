<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanFix — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
.login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.particles {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(20,184,166,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(20,184,166,0.04) 0%, transparent 70%);
}
.particle {
  position:absolute; border-radius:50%; background:rgba(20,184,166,0.15); filter:blur(1px);
  animation:floatParticle linear infinite;
}
@keyframes floatParticle {
  0% { transform:translateY(110vh) scale(0); opacity:0; }
  10% { opacity:1; }
  90% { opacity:1; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}
.orb {
  position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb-1 { width:400px; height:400px; background:rgba(20,184,166,0.25); top:10%; left:15%; }
.orb-2 { width:300px; height:300px; background:rgba(139,92,246,0.15); bottom:20%; right:10%; animation-delay:-8s; }
.orb-3 { width:250px; height:250px; background:rgba(20,184,166,0.12); top:50%; left:60%; animation-delay:-4s; }
@keyframes orbFloat {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-40px) scale(1.1); }
  66% { transform:translate(-20px,20px) scale(0.95); }
}
.grid-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:linear-gradient(rgba(148,163,184,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.login-card-wrap { position:relative; z-index:10; width:100%; max-width:440px; padding:0 24px; }
.login-card {
  background:var(--bg-card); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border-color); border-radius:var(--radius-xl);
  padding:48px 40px; box-shadow:var(--shadow-xl),0 0 60px rgba(20,184,166,0.08);
  animation:cardEnter 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0; transform:translateY(30px);
}
@keyframes cardEnter { to { opacity:1; transform:translateY(0); } }
.login-card::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:180px; height:3px; background:linear-gradient(90deg,transparent,var(--teal-500),transparent); border-radius:0 0 4px 4px;
}
.login-logo { text-align:center; margin-bottom:36px; }
.login-logo-icon {
  width:68px; height:68px; margin:0 auto 20px;
  background:linear-gradient(135deg,var(--teal-500),var(--teal-700));
  border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:700; color:white; box-shadow:0 8px 32px rgba(20,184,166,0.3);
  position:relative; overflow:hidden;
}
.login-logo-icon::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.2) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
.login-logo h1 { font-size:var(--text-2xl); font-weight:700; letter-spacing:-0.5px; margin-bottom:6px; }
.login-logo p { font-size:var(--text-sm); color:var(--text-muted); }
.conn-status {
  display:flex; align-items:center; gap:8px; font-size:var(--text-xs); color:var(--success-500); margin-top:16px; justify-content:center;
}
.conn-status .dot { width:7px; height:7px; background:var(--success-500); border-radius:50%; animation:pulseDot 2s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }
.demo-hint {
  margin-top:20px; text-align:center;
  font-size:var(--text-xs); color:var(--text-muted);
  background:var(--bg-tertiary); padding:10px 16px; border-radius:var(--radius-md);
  display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; width:100%;
}
.demo-hint code { background:rgba(20,184,166,0.12); color:var(--teal-500); padding:2px 8px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:11px; }
.theme-toggle { position:fixed; top:20px; right:20px; z-index:100; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:10px; cursor:pointer; color:var(--text-secondary); transition:all var(--duration-fast); backdrop-filter:blur(10px); }
.theme-toggle:hover { color:var(--teal-500); border-color:var(--teal-500); }
.role-tabs { display:flex; gap:8px; margin-bottom:24px; }
.role-tab {
  flex:1; padding:10px 8px; border-radius:var(--radius-md); background:var(--bg-tertiary);
  border:1px solid var(--border-color); color:var(--text-muted); font-size:var(--text-sm);
  font-weight:600; cursor:pointer; transition:all var(--duration-fast); text-align:center;
}
.role-tab:hover { color:var(--text-primary); border-color:var(--text-secondary); }
.role-tab.active { background:rgba(20,184,166,0.12); border-color:var(--teal-500); color:var(--teal-500); }
.role-desc { font-size:var(--text-xs); color:var(--text-muted); margin-top:-18px; margin-bottom:18px; text-align:center; }
@media (max-width:480px) {
  .login-card { padding:36px 24px; }
  .orb { display:none; }
}
</style>
</head>
<body class="login-page">

<div class="particles" id="particles"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grid-overlay"></div>

<button class="theme-toggle" id="themeToggle" title="Tema Değiştir">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="toast-container" id="toastContainer"></div>

<div class="login-card-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">CF</div>
      <h1>CleanFix</h1>
      <p>Hesabınıza erişmek için bilgilerinizi girin</p>
    </div>

    <!-- Role selector -->
    <div class="role-tabs" id="roleTabs">
      <button type="button" class="role-tab active" data-role="admin" onclick="setRole('admin')">Admin</button>
      <button type="button" class="role-tab" data-role="company" onclick="setRole('company')">Firma</button>
      <button type="button" class="role-tab" data-role="employee" onclick="setRole('employee')">Çalışan</button>
    </div>
    <p class="role-desc" id="roleDesc">E-posta ve şifrenizle giriş yapın</p>

    <form id="loginForm" novalidate>
      <!-- Admin: email -->
      <div class="form-group" id="emailGroup">
        <label class="form-label" id="emailLabel">E-posta</label>
        <div style="position:relative">
          <input type="text" class="form-input" id="email" placeholder="admin@cleanfix.com" value="admin@cleanfix.com" autocomplete="username" required>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
        </div>
        <div class="form-error">Bu alan gereklidir</div>
      </div>

      <div class="form-group" id="passwordGroup">
        <label class="form-label">Şifre</label>
        <div style="position:relative">
          <input type="password" class="form-input" id="password" placeholder="••••••••" value="admin123" autocomplete="current-password" required>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;" id="togglePassword" role="button" tabindex="0">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
        <div class="form-error">Şifre en az 6 karakter olmalı</div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <label class="toggle">
          <input type="checkbox" id="rememberMe">
          <span class="toggle-track"></span>
          <span class="toggle-label">Bu cihazda hatırla</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:var(--text-base);position:relative;overflow:hidden;" id="submitBtn">
        <span id="btnText">Giriş Yap</span>
        <span id="btnLoader" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;">
          <span style="width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;"></span>
        </span>
      </button>
    </form>

    <div class="demo-hint" id="demoHint">
      <span>Demo:</span> <code>admin@cleanfix.com</code> <span>/</span> <code>admin123</code>
    </div>
    <div class="conn-status">
      <span class="dot"></span> API bağlantısı hazır — Vercel Edge
    </div>
  </div>
</div>

<script>
const html=document.documentElement;
let theme=localStorage.getItem('cf-theme')||'dark';
html.setAttribute('data-theme',theme);
const themeToggle=document.getElementById('themeToggle');
const sunIcon=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
const moonIcon=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
themeToggle.innerHTML=theme==='dark'?sunIcon:moonIcon;
themeToggle.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';html.setAttribute('data-theme',theme);localStorage.setItem('cf-theme',theme);themeToggle.innerHTML=theme==='dark'?sunIcon:moonIcon;});

const particlesContainer=document.getElementById('particles');
for(let i=0;i<20;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'vw';
  p.style.width=p.style.height=(Math.random()*4+2)+'px';
  p.style.animationDuration=(Math.random()*15+10)+'s';
  p.style.animationDelay=Math.random()*10+'s';
  particlesContainer.appendChild(p);
}

const pwInput=document.getElementById('password');
const eyeBtn=document.getElementById('togglePassword');
eyeBtn.addEventListener('click',()=>{
  const type=pwInput.type==='password'?'text':'password';
  pwInput.setAttribute('type',type);
  document.getElementById('eyeIcon').innerHTML=type==='password'?'<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>':'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
});

function showToast(msg,type='success',dur=3000){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  const icon=type==='success'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span class="toast-icon">${icon}</span><div class="toast-content"><div class="toast-title">${type==='success'?'Başarılı':'Hata'}</div><div class="toast-message">${msg}</div></div><span class="toast-close" onclick="this.parentElement.remove()">✕</span><div class="toast-progress"></div>`;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('exit');setTimeout(()=>t.remove(),300);},dur);
}

/* --- Role Switcher Logic --- */
let currentRole = 'admin';
const emailGroup = document.getElementById('emailGroup');
const emailLabel = document.getElementById('emailLabel');
const emailInput = document.getElementById('email');
const roleDesc = document.getElementById('roleDesc');
const demoHint = document.getElementById('demoHint');

function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-role="${role}"]`).classList.add('active');

  if (role === 'admin') {
    emailLabel.textContent = 'E-posta';
    emailInput.placeholder = 'admin@cleanfix.com';
    emailInput.value = 'admin@cleanfix.com';
    emailInput.type = 'email';
    roleDesc.textContent = 'E-posta ve şifrenizle giriş yapın';
    demoHint.innerHTML = '<span>Demo:</span> <code>admin@cleanfix.com</code> <span>/</span> <code>admin123</code>';
  } else if (role === 'company') {
    emailLabel.textContent = 'Firma Kodu';
    emailInput.placeholder = 'CLEAN-001';
    emailInput.value = 'CLEAN-001';
    emailInput.type = 'text';
    roleDesc.textContent = 'Firma kodunuz ve şifrenizle giriş yapın';
    demoHint.innerHTML = '<span>Demo:</span> <code>CLEAN-001</code> <span>/</span> <code>admin123</code>';
  } else if (role === 'employee') {
    emailLabel.textContent = 'Çalışan Kodu';
    emailInput.placeholder = 'EMP-001';
    emailInput.value = 'EMP-001';
    emailInput.type = 'text';
    roleDesc.textContent = 'Çalışan kodunuz ve şifrenizle giriş yapın';
    demoHint.innerHTML = '<span>Demo:</span> <code>EMP-001</code> <span>/</span> <code>admin123</code>';
  }
}

/* Form Submit */
const form=document.getElementById('loginForm');
const submitBtn=document.getElementById('submitBtn');
const btnText=document.getElementById('btnText');
const btnLoader=document.getElementById('btnLoader');

form.addEventListener('submit',async(e)=>{
  e.preventDefault();
  document.getElementById('emailGroup').classList.remove('has-error');
  document.getElementById('passwordGroup').classList.remove('has-error');

  const userVal = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let err=false;

  if (!userVal) { document.getElementById('emailGroup').classList.add('has-error'); err=true; }
  if (!password || password.length<6) { document.getElementById('passwordGroup').classList.add('has-error'); err=true; }
  if (err) { showToast('Lütfen tüm alanları doğru doldurun','error'); return; }

  btnText.style.display='none'; btnLoader.style.display='flex'; submitBtn.disabled=true;
  await new Promise(r=>setTimeout(r,1500));

  // Simulate login redirect based on role
  let target = 'dashboard.html';
  if (currentRole === 'company') target = 'company.html';
  if (currentRole === 'employee') target = 'employee.html';

  showToast('Giriş başarılı! Yönlendiriliyorsunuz...','success');
  setTimeout(()=>{ window.location.href = target; }, 1200);
});

['email','password'].forEach(id=>document.getElementById(id).addEventListener('input',()=>document.getElementById(id+'Group').classList.remove('has-error')));
</script>
</body>
</html>
