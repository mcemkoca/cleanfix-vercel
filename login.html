<style>

.toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:500;color:white;box-shadow:var(--shadow-lg);animation:toastIn 0.3s ease;max-width:320px;}
.toast.error{background:var(--error-500);}
.toast.success{background:var(--success-500);}
.toast.info{background:var(--info-500);}
@keyframes toastIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes toastOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(120%);opacity:0;}}
.toast.out{animation:toastOut 0.3s ease forwards;}


.login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.particles {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(20,184,166,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(20,184,166,0.04) 0%, transparent 70%);
}
.particle {
  position:absolute; border-radius:50%; background:rgba(20,184,166,0.15); filter:blur(1px);
  animation:floatParticle linear infinite;
}
@keyframes floatParticle {
  0% { transform:translateY(110vh) scale(0); opacity:0; }
  10% { opacity:1; }
  90% { opacity:1; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}
.orb {
  position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb-1 { width:400px; height:400px; background:rgba(20,184,166,0.25); top:10%; left:15%; }
.orb-2 { width:300px; height:300px; background:rgba(139,92,246,0.15); bottom:20%; right:10%; animation-delay:-8s; }
.orb-3 { width:250px; height:250px; background:rgba(20,184,166,0.12); top:50%; left:60%; animation-delay:-4s; }
@keyframes orbFloat {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-40px) scale(1.1); }
  66% { transform:translate(-20px,20px) scale(0.95); }
}
.grid-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:linear-gradient(rgba(148,163,184,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(148,163,184,0.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.login-card-wrap { position:relative; z-index:10; width:100%; max-width:440px; padding:0 24px; }
.login-card {
  background:var(--bg-card); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border-color); border-radius:var(--radius-xl);
  padding:48px 40px; box-shadow:var(--shadow-xl),0 0 60px rgba(20,184,166,0.08);
  animation:cardEnter 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0; transform:translateY(30px);
}
@keyframes cardEnter { to { opacity:1; transform:translateY(0); } }
.login-card::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:180px; height:3px; background:linear-gradient(90deg,transparent,var(--teal-500),transparent); border-radius:0 0 4px 4px;
}
.login-logo { text-align:center; margin-bottom:36px; }
.login-logo-icon {
  width:68px; height:68px; margin:0 auto 20px;
  background:linear-gradient(135deg,var(--teal-500),var(--teal-700));
  border-radius:var(--radius-lg); display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:700; color:white; box-shadow:0 8px 32px rgba(20,184,166,0.3);
  position:relative; overflow:hidden;
}
.login-logo-icon::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.2) 50%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
.login-logo h1 { font-size:var(--text-2xl); font-weight:700; letter-spacing:-0.5px; margin-bottom:6px; }
.login-logo p { font-size:var(--text-sm); color:var(--text-muted); }
.conn-status {
  display:flex; align-items:center; gap:8px; font-size:var(--text-xs); color:var(--success-500); margin-top:16px; justify-content:center;
}
.conn-status .dot { width:7px; height:7px; background:var(--success-500); border-radius:50%; animation:pulseDot 2s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }
.demo-hint {
  margin-top:20px; text-align:center;
  font-size:var(--text-xs); color:var(--text-muted);
  background:var(--bg-tertiary); padding:10px 16px; border-radius:var(--radius-md);
  display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center; width:100%;
}
.demo-hint code { background:rgba(20,184,166,0.12); color:var(--teal-500); padding:2px 8px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:11px; }
.theme-toggle { position:fixed; top:20px; right:20px; z-index:100; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-md); padding:10px; cursor:pointer; color:var(--text-secondary); transition:all var(--duration-fast); backdrop-filter:blur(10px); }
.theme-toggle:hover { color:var(--teal-500); border-color:var(--teal-500); }
/* Language Switcher */
.lang-switcher {
  display:flex; align-items:center; gap:4px;
  background:var(--bg-card); border:1px solid var(--border-color);
  border-radius:var(--radius-md); padding:3px;
  position:fixed; top:20px; right:64px; z-index:100;
}
.lang-switcher button {
  background:transparent; border:none; color:var(--text-muted);
  font-size:11px; font-weight:600; cursor:pointer;
  padding:4px 8px; border-radius:4px; transition:all var(--duration-fast);
  text-transform:uppercase; font-family:inherit;
}
.lang-switcher button:hover { color:var(--text-primary); }
.lang-switcher button.active { background:var(--teal-500); color:white; }
.role-tabs { display:flex; gap:8px; margin-bottom:24px; }
.role-tab {
  flex:1; padding:10px 8px; border-radius:var(--radius-md); background:var(--bg-tertiary);
  border:1px solid var(--border-color); color:var(--text-muted); font-size:var(--text-sm);
  font-weight:600; cursor:pointer; transition:all var(--duration-fast); text-align:center;
}
.role-tab:hover { color:var(--text-primary); border-color:var(--text-secondary); }
.role-tab.active { background:rgba(20,184,166,0.12); border-color:var(--teal-500); color:var(--teal-500); }
.role-desc { font-size:var(--text-xs); color:var(--text-muted); margin-top:-18px; margin-bottom:18px; text-align:center; }
@media (max-width:480px) {
  .login-card { padding:36px 24px; }
  .orb { display:none; }
}

::selection { background: rgba(20,184,166,0.3); color: inherit; }

/* ── Mobile Responsive ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0 !important; }
  .hamburger { display: flex !important; }
  .content { padding: 16px !important; }
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
  .header { padding: 0 16px !important; }
  .header-left { gap: 8px !important; }
  .page-title { font-size: var(--text-base) !important; }
  .toolbar { flex-direction: column !important; align-items: stretch !important; gap: 12px !important; }
  .search-box { max-width: 100% !important; }
  .filters { flex-wrap: wrap !important; }
  .table-wrap { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  .table-wrap .table { min-width: 600px; }
  .action-btn, .category-toggle, .mc-nav button {
    width: 44px !important; height: 44px !important;
  }
  .modal { max-width: calc(100vw - 32px) !important; margin: 0 16px; }
  .portal-stats { grid-template-columns: repeat(2, 1fr) !important; }
  .portal-two-col { grid-template-columns: 1fr !important; }
  .ticket-form { grid-template-columns: 1fr !important; }
  .kanban { grid-template-columns: 1fr !important; }
  .equip-grid { grid-template-columns: 1fr !important; }
  .sector-grid { grid-template-columns: 1fr !important; }
  .tool-grid { grid-template-columns: 1fr !important; }
  .module-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .lang-switcher { margin-left: 0 !important; }
  .login-card { padding: 32px 20px !important; }
  .login-card-wrap { padding: 0 16px !important; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr !important; }
  .content { padding: 12px !important; }
  .card-header { padding: 14px 16px !important; }
  .card-body { padding: 14px 16px !important; }
  .table th, .table td, .card-table th, .card-table td,
  .customer-table th, .customer-table td,
  .recurring-table th, .recurring-table td,
  .line-items-table th, .line-items-table td {
    padding: 10px 12px !important; font-size: 13px !important;
  }
  .page-title { font-size: var(--text-sm) !important; }
  .modal { max-width: calc(100vw - 24px) !important; margin: 0 12px; }
  .btn { padding: 10px 14px !important; font-size: 13px !important; }
  .portal-stats { grid-template-columns: 1fr !important; }
  .stat-value { font-size: var(--text-xl) !important; }
  .header-btn { width: 40px !important; height: 40px !important; }
}

@media (max-width: 768px) {
  .card-body:has(> .table),
  .card-body:has(> table) { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .card-body:has(> .table) .table,
  .card-body:has(> table) table { min-width: 640px; }
}
</style>

let currentLang = localStorage.getItem('cleanfix_lang') || 'tr';

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('cleanfix_lang', lang);
  document.documentElement.lang = lang;

  document.querySelectorAll('.lang-switcher button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const t = i18n[lang] && i18n[lang][key];
    if (!t) return;
    const attr = el.dataset.i18nAttr;
    if (attr) {
      el.setAttribute(attr, t);
    } else if (el.tagName === 'TITLE') {
      el.textContent = t;
    } else if (el.tagName === 'A' || el.tagName === 'BUTTON') {
      if (el.children.length === 0) {
        el.textContent = t;
      } else {
        const textNodes = Array.from(el.childNodes).filter(n => n.nodeType === 3);
        if (textNodes.length > 0) textNodes[0].textContent = t;
      }
    } else {
      if (t.includes('<')) {
        el.innerHTML = t;
      } else {
        el.textContent = t;
      }
    }
  });

  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (i18n[lang] && i18n[lang][key]) el.placeholder = i18n[lang][key];
  });

  const featuredCard = document.querySelector('.pricing-card.featured, .plan-card.featured');
  if (featuredCard) {
    featuredCard.dataset.popular = lang === 'tr' ? 'En Popüler' : lang === 'en' ? 'Most Popular' : 'Meest Populair';
  }
}

const html=document.documentElement;
let theme=localStorage.getItem('cf-theme')||'dark';

function showToast(msg,type='success',dur=3000){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  const icon=type==='success'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  const titleText = type==='success' ? (i18n[currentLang].toast_success||'Başarılı') : (i18n[currentLang].toast_error||'Hata');
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span class="toast-icon">${icon}</span><div class="toast-content"><div class="toast-title">${titleText}</div><div class="toast-message">${msg}</div></div><span class="toast-close" onclick="this.parentElement.remove()">✕</span><div class="toast-progress"></div>`;
  c.appendChild(t);
  setTimeout(()=>{t.classList.add('exit');setTimeout(()=>t.remove(),300);},dur);
}

/* --- Role Switcher Logic --- */
let currentRole = 'admin';
const emailGroup = document.getElementById('emailGroup');
const emailLabel = document.getElementById('emailLabel');
const emailInput = document.getElementById('email');
const roleDesc = document.getElementById('roleDesc');
const demoHint = document.getElementById('demoHint');

function updateRoleText(role) {
  const L = i18n[currentLang];
  if (role === 'admin') {
    emailLabel.textContent = L.label_email;
    emailInput.placeholder = L.ph_email;
    roleDesc.textContent = L.role_desc_admin;
  } else if (role === 'company') {
    emailLabel.textContent = L.label_company;
    emailInput.placeholder = L.ph_company;
    roleDesc.textContent = L.role_desc_company;
  } else if (role === 'employee') {
    emailLabel.textContent = L.label_employee;
    emailInput.placeholder = L.ph_employee;
    roleDesc.textContent = L.role_desc_employee;
  }
}

function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-role="${role}"]`).classList.add('active');

  updateRoleText(role);

  if (role === 'admin') {
    emailInput.value = 'admin@cleanfix.com';
    emailInput.type = 'email';
    demoHint.innerHTML = '<span data-i18n="demo_label">Demo:</span> <code>admin@cleanfix.com</code> <span>/</span> <code>admin123</code>';
  } else if (role === 'company') {
    emailInput.value = 'CLEAN-001';
    emailInput.type = 'text';
    demoHint.innerHTML = '<span data-i18n="demo_label">Demo:</span> <code>CLEAN-001</code> <span>/</span> <code>admin123</code>';
  } else if (role === 'employee') {
    emailInput.value = 'EMP-001';
    emailInput.type = 'text';
    demoHint.innerHTML = '<span data-i18n="demo_label">Demo:</span> <code>EMP-001</code> <span>/</span> <code>admin123</code>';
  }
}

/* Form Submit */
const form=document.getElementById('loginForm');
const submitBtn=document.getElementById('submitBtn');
const btnText=document.getElementById('btnText');
const btnLoader=document.getElementById('btnLoader');

form.addEventListener('submit',async(e)=>{
  e.preventDefault();
  document.getElementById('emailGroup').classList.remove('has-error');
  document.getElementById('passwordGroup').classList.remove('has-error');

  const userVal = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let err=false;

  if (!userVal) { document.getElementById('emailGroup').classList.add('has-error'); err=true; }
  if (!password || password.length<6) { document.getElementById('passwordGroup').classList.add('has-error'); err=true; }
  if (err) { showToast(i18n[currentLang].toast_fill || 'Lütfen tüm alanları doğru doldurun','error'); return; }

  btnText.style.display='none'; btnLoader.style.display='flex'; submitBtn.disabled=true;
  await new Promise(r=>setTimeout(r,1500));

  let target = 'dashboard.html';
  if (currentRole === 'company') target = 'company.html';
  if (currentRole === 'employee') target = 'employee.html';

  showToast(i18n[currentLang].toast_success_msg || 'Giriş başarılı! Yönlendiriliyorsunuz...','success');
  localStorage.setItem('kobipro_auth_token', 'demo_' + Date.now());
  localStorage.setItem('kobipro_user', JSON.stringify({name:'Jan Wouters',email:'jan@cleanfix.be',role:'admin'}));
  let redirectTarget = target;
  const urlParams = new URLSearchParams(window.location.search);
  const redirectParam = urlParams.get('redirect');
  if(redirectParam === 'buildpro') redirectTarget = 'https://mcemkoca.github.io/buildpro-vercel/dashboard.html';
  if(redirectParam === 'barberpro') redirectTarget = 'https://mcemkoca.github.io/barberpro-vercel/dashboard.html';
  setTimeout(()=>{ window.location.href = redirectTarget; }, 1200);
});

<script>
(function(){
  function showToast(msg,type='error'){
    let c=document.querySelector('.toast-container');
    if(!c){c=document.createElement('div');c.className='toast-container';document.body.appendChild(c);}
    let t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);
    setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300);},4000);
  }
  function validateEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
  function validatePhone(v){return v.replace(/\D/g,'').length>=7;}
  document.querySelectorAll('form, .modal').forEach(form=>{
    const inputs=form.querySelectorAll('input, select, textarea');
    const submitBtn=form.querySelector('button.btn-primary, button[type="submit"]');
    if(!submitBtn) return;
    const origClick=submitBtn.onclick;
    submitBtn.onclick=function(e){
      let ok=true;
      inputs.forEach(inp=>{
        if(inp.type==='hidden'||inp.disabled) return;
        const val=inp.value.trim();
        const req=inp.required||inp.classList.contains('required');
        if(req && !val){ ok=false; inp.style.borderColor='var(--error-500)'; setTimeout(()=>inp.style.borderColor='',2000); }
        if(inp.type==='email' && val && !validateEmail(val)){ ok=false; showToast('Geçerli e-posta giriniz / Valid email required / Geldig e-mailadres vereist'); }
        if(inp.dataset.type==='phone' || inp.name?.includes('phone') || inp.id?.includes('phone') || inp.placeholder?.toLowerCase().includes('telefon')){
          if(val && !validatePhone(val)){ ok=false; showToast('Telefon en az 7 hane olmalı / Phone min 7 digits / Telefoon min 7 cijfers'); }
        }
      });
      if(!ok){ e.preventDefault?e.preventDefault():null; e.stopPropagation?e.stopPropagation():null; return false; }
      if(origClick) return origClick.call(this,e);
    };
  });
})();

function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  if(sb){sb.classList.toggle('open');sb.classList.toggle('collapsed');}
}
