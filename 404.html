<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" data-i18n-attr="content" data-i18n="meta_desc">
<title data-i18n="page_title">CleanFix — Sayfa Bulunamadı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
.error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.particles {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(20,184,166,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(99,102,241,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(20,184,166,0.04) 0%, transparent 70%);
}
.orb {
  position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb-1 { width:400px; height:400px; background:rgba(20,184,166,0.25); top:10%; left:15%; }
.orb-2 { width:300px; height:300px; background:rgba(139,92,246,0.15); bottom:20%; right:10%; animation-delay:-8s; }
.orb-3 { width:250px; height:250px; background:rgba(20,184,166,0.12); top:50%; left:60%; animation-delay:-4s; }
@keyframes orbFloat {
  0%,100% { transform:translate(0,0) scale(1); }
  33% { transform:translate(30px,-40px) scale(1.1); }
  66% { transform:translate(-20px,20px) scale(0.95); }
}
.error-card-wrap { position:relative; z-index:10; width:100%; max-width:480px; padding:0 24px; text-align:center; }
.error-card {
  background:var(--bg-card); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border-color); border-radius:var(--radius-xl);
  padding:56px 40px; box-shadow:var(--shadow-xl),0 0 60px rgba(20,184,166,0.08);
  animation:cardEnter 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0; transform:translateY(30px);
}
@keyframes cardEnter { to { opacity:1; transform:translateY(0); } }
.error-emoji { font-size:72px; margin-bottom:24px; animation:floatEmoji 3s ease-in-out infinite; display:inline-block; }
@keyframes floatEmoji {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-12px); }
}
.error-code {
  font-size:96px; font-weight:800; line-height:1;
  background:linear-gradient(135deg,var(--teal-500),var(--teal-700));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:8px;
}
.error-title { font-size:var(--text-2xl); font-weight:700; margin-bottom:12px; color:var(--text-primary); }
.error-desc { font-size:var(--text-sm); color:var(--text-muted); line-height:1.7; margin-bottom:32px; }
.error-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.lang-switcher {
  position:fixed; top:24px; right:24px; z-index:50;
  display:flex; gap:6px; background:var(--bg-card); border:1px solid var(--border-color);
  border-radius:var(--radius-md); padding:4px; box-shadow:var(--shadow-md);
}
.lang-btn {
  padding:6px 12px; border-radius:var(--radius-sm); font-size:var(--text-xs); font-weight:600;
  color:var(--text-muted); background:transparent; border:none; cursor:pointer; transition:all 0.2s;
}
.lang-btn:hover { color:var(--text-primary); }
.lang-btn.active-lang { background:var(--teal-500); color:white; }
</style>
</head>
<body>
<div class="particles">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="lang-switcher">
  <button class="lang-btn active-lang" data-lang="tr" onclick="switchLang('tr')">TR</button>
  <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
  <button class="lang-btn" data-lang="nl" onclick="switchLang('nl')">NL</button>
</div>

<div class="error-page">
  <div class="error-card-wrap">
    <div class="error-card">
      <div class="error-emoji">🧹🌪️</div>
      <div class="error-code">404</div>
      <h1 class="error-title" data-i18n="title">Sayfa Bulunamadı</h1>
      <p class="error-desc" data-i18n="desc">Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir. Belki de sadece biraz tozlandı. 🧽</p>
      <div class="error-actions">
        <a href="dashboard.html" class="btn btn-primary" data-i18n="btn_dashboard">Dashboard'a Dön</a>
        <a href="index.html" class="btn btn-secondary" data-i18n="btn_home">Ana Sayfa</a>
      </div>
    </div>
  </div>
</div>

<script>
const i18n = {
  tr: {
    page_title: 'CleanFix — Sayfa Bulunamadı',
    meta_desc: 'CleanFix - Aradığınız sayfa bulunamadı.',
    title: 'Sayfa Bulunamadı',
    desc: 'Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir. Belki de sadece biraz tozlandı. 🧽',
    btn_dashboard: "Dashboard'a Dön",
    btn_home: 'Ana Sayfa'
  },
  en: {
    page_title: 'CleanFix — Page Not Found',
    meta_desc: 'CleanFix - The page you are looking for could not be found.',
    title: 'Page Not Found',
    desc: 'The page you are looking for may have been moved, deleted, or never existed. Maybe it just got a little dusty. 🧽',
    btn_dashboard: 'Back to Dashboard',
    btn_home: 'Homepage'
  },
  nl: {
    page_title: 'CleanFix — Pagina Niet Gevonden',
    meta_desc: 'CleanFix - De pagina die u zoekt, is niet gevonden.',
    title: 'Pagina Niet Gevonden',
    desc: 'De pagina die u zoekt, is misschien verplaatst, verwijderd of heeft nooit bestaan. Misschien is het gewoon een beetje stoffig geworden. 🧽',
    btn_dashboard: 'Terug naar Dashboard',
    btn_home: 'Homepagina'
  }
};

let _currentLang = localStorage.getItem('cleanfix_lang') || 'tr';
function switchLang(lang) {
  _currentLang = lang;
  localStorage.setItem('cleanfix_lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active-lang', b.dataset.lang === lang));
  applyLang();
}
function applyLang() {
  const t = i18n[_currentLang] || i18n['tr'];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i18n-attr]').forEach(el => {
    const attr = el.dataset.i18nAttr;
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.setAttribute(attr, t[key]);
  });
  const titleEl = document.querySelector('title');
  if (titleEl && t['page_title']) titleEl.textContent = t['page_title'];
}
document.addEventListener('DOMContentLoaded', () => {
  switchLang(_currentLang);
});

window.onerror = function(msg, url, line) {
  console.error('CleanFix Error:', msg, 'at', url, ':' , line);
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  console.error('Unhandled Promise:', e.reason);
});
</script>
  <script src="js/app.js"></script>
</body>
</html>
