<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CleanFix — Firma Takvimi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
.dashboard{display:flex;min-height:100vh;background:var(--bg-primary);}
.sidebar{width:280px;height:100vh;background:var(--bg-card);border-right:1px solid var(--border-color);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;}
.sidebar-header{padding:20px 24px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:12px;}
.sidebar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--teal-500),var(--teal-700));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:14px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px;}
.nav-group{margin-bottom:8px;}
.nav-group-header{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:var(--text-xs);font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--text-sm);font-weight:500;text-decoration:none;}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary);}
.nav-item.active{background:rgba(20,184,166,0.1);color:var(--teal-500);}
.nav-icon{width:20px;height:20px;opacity:0.7;}
.main-content{flex:1;margin-left:280px;min-height:100vh;}
.header{height:64px;background:var(--bg-card);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50;}
.hamburger{display:none;background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:8px;}
.content{padding:32px;max-width:1400px;}

.calendar-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:16px;}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-nav button{width:36px;height:36px;border-radius:var(--radius-md);background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;}
.cal-nav button:hover{border-color:var(--teal-500);color:var(--teal-500);}
.cal-title{font-size:var(--text-lg);font-weight:700;}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
.day-col{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-xl);overflow:hidden;min-height:480px;}
.day-header{padding:14px 16px;border-bottom:1px solid var(--border-color);text-align:center;background:rgba(20,184,166,0.03);}
.day-name{font-size:var(--text-xs);font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.day-date{font-size:var(--text-xl);font-weight:700;}
.day-body{padding:10px;display:flex;flex-direction:column;gap:8px;}

.event-card{padding:10px 12px;border-radius:var(--radius-lg);border-left:3px solid;font-size:var(--text-xs);cursor:pointer;transition:all 0.2s;}
.event-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.event-card.confirmed{background:rgba(16,185,129,0.08);border-color:var(--success-500);color:var(--text-primary);}
.event-card.pending{background:rgba(245,158,11,0.08);border-color:var(--amber-500);color:var(--text-primary);}
.event-card.completed{background:rgba(59,130,246,0.08);border-color:var(--info-500);color:var(--text-primary);}
.event-time{font-weight:700;margin-bottom:4px;font-size:var(--text-xs);color:var(--text-muted);}
.event-customer{font-weight:600;margin-bottom:2px;}
.event-service{color:var(--text-muted);margin-bottom:2px;}
.event-staff{display:flex;align-items:center;gap:4px;color:var(--text-muted);}
.event-staff-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

.today .day-header{background:rgba(20,184,166,0.12);}
.today .day-name{color:var(--teal-500);}
.today .day-date{color:var(--teal-500);}

.legend{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:var(--text-xs);color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-xl);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalIn 0.3s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:var(--text-lg);font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--text-muted);cursor:pointer;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border-color);display:flex;gap:12px;justify-content:flex-end;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:var(--text-xs);font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.form-input,.form-select{width:100%;padding:10px 14px;background:var(--bg-card);border:1.5px solid var(--border-color);border-radius:var(--radius-md);color:var(--text-primary);font-size:var(--text-sm);transition:all var(--duration-fast);}
.form-input:focus,.form-select:focus{border-color:var(--teal-500);box-shadow:0 0 0 3px var(--shadow-glow);outline:none;}

@media (max-width:1024px){.calendar-grid{grid-template-columns:repeat(4,1fr);}}
@media (max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main-content{margin-left:0;}.hamburger{display:block;}.calendar-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:480px){.calendar-grid{grid-template-columns:1fr;}}

</style>

<div class="toast-container" id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:300;"></div>

<script>
const staffColors={'Ahmet K.':'#3b82f6','Mehmet D.':'#8b5cf6','Ayşe R.':'#f59e0b','Serkan C.':'#10b981','Nisa Y.':'#ec4899'};
const weekData={
  'Pzt':{date:'12 May',events:[
    {time:'09:00',customer:'Jan Peeters',service:'Komple Detaylı Temizlik',staff:'Ahmet K.',status:'confirmed'},
    {time:'11:30',customer:'Lisa Wouters',service:'İç Temizlik',staff:'Ayşe R.',status:'completed'},
    {time:'14:00',customer:'Pieter De Vos',service:'Dış Yıkama + Cila',staff:'Mehmet D.',status:'pending'},
    {time:'16:30',customer:'Sarah Janssens',service:'Motor Temizliği',staff:'Serkan C.',status:'confirmed'},
  ]},
  'Sal':{date:'13 May',events:[
    {time:'10:00',customer:'Marc Dubois',service:'Keramik Kaplama',staff:'Ahmet K.',status:'pending'},
    {time:'13:00',customer:'Eva Peeters',service:'İç + Dış Temizlik',staff:'Nisa Y.',status:'confirmed'},
    {time:'15:30',customer:'Jan Peeters',service:'İç Temizlik',staff:'Ayşe R.',status:'confirmed'},
  ]},
  'Çar':{date:'14 May',events:[
    {time:'09:30',customer:'Lisa Wouters',service:'İç Temizlik',staff:'Mehmet D.',status:'confirmed'},
    {time:'12:00',customer:'Pieter De Vos',service:'Motor Temizliği',staff:'Serkan C.',status:'completed'},
    {time:'14:30',customer:'Sarah Janssens',service:'Dış Yıkama + Cila',staff:'Nisa Y.',status:'pending'},
    {time:'17:00',customer:'Marc Dubois',service:'Far Parlatma',staff:'Ahmet K.',status:'confirmed'},
  ]},
  'Per':{date:'15 May',events:[
    {time:'10:00',customer:'Eva Peeters',service:'Komple Detaylı Temizlik',staff:'Ayşe R.',status:'confirmed'},
    {time:'13:00',customer:'Jan Peeters',service:'Keramik Kaplama',staff:'Mehmet D.',status:'pending'},
    {time:'16:00',customer:'Lisa Wouters',service:'İç Temizlik',staff:'Nisa Y.',status:'confirmed'},
  ]},
  'Cum':{date:'16 May',events:[
    {time:'09:00',customer:'Sarah Janssens',service:'Komple Detaylı Temizlik',staff:'Ahmet K.',status:'confirmed'},
    {time:'11:30',customer:'Marc Dubois',service:'Dış Yıkama + Cila',staff:'Serkan C.',status:'completed'},
    {time:'14:00',customer:'Eva Peeters',service:'Motor Temizliği',staff:'Mehmet D.',status:'confirmed'},
    {time:'16:30',customer:'Pieter De Vos',service:'İç Temizlik',staff:'Nisa Y.',status:'pending'},
  ]},
  'Cmt':{date:'17 May',events:[
    {time:'10:00',customer:'Jan Peeters',service:'Dış Yıkama + Cila',staff:'Ahmet K.',status:'confirmed'},
    {time:'13:00',customer:'Lisa Wouters',service:'Komple Detaylı Temizlik',staff:'Ayşe R.',status:'pending'},
  ]},
  'Paz':{date:'18 May',events:[
    {time:'11:00',customer:'Sarah Janssens',service:'İç Temizlik',staff:'Nisa Y.',status:'confirmed'},
  ]},
};

let currentOffset=0;
function renderCalendar(){
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  const days=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  days.forEach((dayName,idx)=>{
    const day=weekData[dayName];
    const isToday=idx===2; // Çarşamba = today demo
    const col=document.createElement('div');
    col.className='day-col'+(isToday?' today':'');
    let eventsHtml=day.events.map((e,i)=>{
      const statusClass=e.status;
      const color=staffColors[e.staff]||'#14b8a6';
      return `<div class="event-card ${statusClass}" onclick="openDetail('${dayName}',${i})">
        <div class="event-time">${e.time}</div>
        <div class="event-customer">${e.customer}</div>
        <div class="event-service">${e.service}</div>
        <div class="event-staff"><span class="event-staff-dot" style="background:${color};"></span>${e.staff}</div>
      </div>`;
    }).join('');
    col.innerHTML=`<div class="day-header"><div class="day-name">${dayName}</div><div class="day-date">${day.date}</div></div><div class="day-body">${eventsHtml}</div>`;
    grid.appendChild(col);
  });
}
function changeWeek(dir){currentOffset+=dir;renderCalendar();}
function resetWeek(){currentOffset=0;renderCalendar();}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function openDetail(dayName,idx){
  const e=weekData[dayName].events[idx];
  document.getElementById('detailTitle').textContent=`${e.customer} — ${e.time}`;
  const color=staffColors[e.staff]||'#14b8a6';
  const statusBadge=e.status==='confirmed'?'<span class="tag" style="background:rgba(16,185,129,0.1);color:var(--success-500);">Onaylı</span>':e.status==='pending'?'<span class="tag" style="background:rgba(245,158,11,0.1);color:var(--amber-500);">Beklemede</span>':'<span class="tag" style="background:rgba(59,130,246,0.1);color:var(--info-500);">Tamamlandı</span>';
  document.getElementById('detailBody').innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;"><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:12px 16px;"><div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">Hizmet</div><div style="font-size:var(--text-sm);font-weight:600;">${e.service}</div></div><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:12px 16px;"><div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">Durum</div><div style="font-size:var(--text-sm);font-weight:600;">${statusBadge}</div></div><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:12px 16px;"><div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">Çalışan</div><div style="font-size:var(--text-sm);font-weight:600;display:flex;align-items:center;gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;"></span>${e.staff}</div></div><div style="background:var(--bg-tertiary);border-radius:var(--radius-md);padding:12px 16px;"><div style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:4px;">Gün</div><div style="font-size:var(--text-sm);font-weight:600;">${dayName} — ${weekData[dayName].date}</div></div></div><div style="font-size:var(--text-sm);color:var(--text-secondary);line-height:1.6;">Randevu notları burada görüntülenecek. Çalışan görev listesi, kullanılacak ürünler ve müşteri özel talepleri.</div>`;
  openModal('detailModal');
}
function addEvent(){
  const customer=document.getElementById('addCustomer').value;
  const date=document.getElementById('addDate').value;
  const time=document.getElementById('addTime').value;
  const service=document.getElementById('addService').value;
  const staff=document.getElementById('addStaff').value;
  if(!customer||!date||!time){showToast('Lütfen zorunlu alanları doldurun','error');return;}
  showToast('Randevu eklendi');
  ['addCustomer','addDate','addTime'].forEach(id=>document.getElementById(id).value='');
  closeModal('addModal');
}
function showToast(msg,type='success',dur=3000){
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  const icon=type==='success'?'✓':'✕';
  t.style.cssText='background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-xl);margin-bottom:10px;animation:toastIn 0.3s ease;min-width:260px;';
  const color=type==='success'?'var(--success-500)':'var(--error-500)';
  t.innerHTML=`<span style="color:${color};font-weight:700;">${icon}</span><span style="font-size:var(--text-sm);font-weight:500;">${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='all 0.3s';setTimeout(()=>t.remove(),300);},dur);
}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('active');}));
renderCalendar();
</script>
